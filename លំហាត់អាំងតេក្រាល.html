<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>កម្រងសំណួរអាំងតេក្រាល</title>
    <!-- Import Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Import Google Fonts for Khmer -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Moul&display=swap" rel="stylesheet">
    
    <!-- Import MathJax for rendering math formulas -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body {
            font-family: 'Battambang', cursive;
            background-color: #f3f4f6;
        }
        .font-moul {
            font-family: 'Moul', cursive;
        }
        .option-btn {
            transition: all 0.2s ease-in-out;
            min-height: 60px; /* Ensure buttons are tall enough for math */
            display: flex;
            align-items: center;
        }
        .option-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .selected {
            background-color: #3b82f6 !important;
            color: white !important;
            border-color: #2563eb !important;
        }
        .correct {
            background-color: #10b981 !important; /* Green */
            color: white !important;
            border-color: #059669 !important;
        }
        .wrong {
            background-color: #ef4444 !important; /* Red */
            color: white !important;
            border-color: #dc2626 !important;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Quiz Container -->
    <div id="app-container" class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-6 relative overflow-hidden">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="font-moul text-2xl text-blue-600 mb-2">កម្រងសំណួរគណិតវិទ្យា</h1>
            <p class="text-gray-500 text-sm">សាកល្បងចំណេះដឹងរបស់អ្នកលើការគណនាអាំងតេក្រាល</p>
        </div>

        <!-- Progress Bar -->
        <div id="progress-container" class="w-full bg-gray-200 rounded-full h-2.5 mb-6 hidden">
            <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="text-center py-8">
            <div class="text-6xl text-blue-500 mb-6 font-bold flex justify-center items-center h-32">
                \(\int f(x) dx\)
            </div>
            <button onclick="startQuiz()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition duration-300 transform hover:scale-105">
                ចាប់ផ្តើមធ្វើតេស្ត
            </button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <span id="question-counter" class="text-sm font-bold text-gray-500">សំណួរទី ១ / ២២</span>
                <span id="score-display" class="text-sm font-bold text-blue-500">ពិន្ទុ: ០</span>
            </div>
            
            <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 mb-6">
                <h2 id="question-text" class="text-lg font-bold text-gray-800 text-center min-h-[60px] flex items-center justify-center">
                    សំណួរនឹងបង្ហាញនៅទីនេះ
                </h2>
            </div>

            <div id="options-container" class="space-y-3 mb-6">
                <!-- Options will be injected here by JS -->
            </div>

            <div class="flex justify-end mt-6">
                <button id="next-btn" onclick="nextQuestion()" class="hidden bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition duration-200">
                    បន្ទាប់ ➔
                </button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden text-center py-6">
            <div id="result-icon" class="text-6xl mb-4">🏆</div>
            <h2 class="font-moul text-2xl text-gray-800 mb-2">លទ្ធផលរបស់អ្នក</h2>
            <p class="text-gray-600 mb-6">អ្នកទទួលបានពិន្ទុ</p>
            
            <div class="flex justify-center items-center mb-8">
                <div class="relative w-32 h-32 flex items-center justify-center rounded-full border-8 border-blue-100">
                    <span id="final-score" class="text-4xl font-bold text-blue-600">០/២២</span>
                </div>
            </div>
            
            <p id="result-message" class="text-lg font-bold mb-6 text-gray-700">ល្អណាស់!</p>

            <button onclick="restartQuiz()" class="bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-8 rounded-full shadow-lg transition duration-300">
                ធ្វើម្តងទៀត ↻
            </button>
        </div>

    </div>

    <script>
        // Math Quiz Data (Extracted from all the exams)
        const quizData = [
            {
                question: "គណនាអាំងតេក្រាល៖ \\( \\int_0^{\\ln 2} \\frac{1}{e^x + 2} dx \\)",
                options: ["\\( \\ln\\left(\\frac{3}{2}\\right) \\)", "\\( \\frac{1}{2} \\ln\\left(\\frac{3}{2}\\right) \\)", "\\( 2\\ln\\left(\\frac{3}{2}\\right) \\)", "\\( \\frac{1}{2} \\ln(3) \\)"],
                correctAnswer: 1
            },
            {
                question: "គណនាអាំងតេក្រាល៖ \\( \\int_1^e \\ln(x) dx \\)",
                options: ["\\( 0 \\)", "\\( e \\)", "\\( 1 \\)", "\\( e - 1 \\)"],
                correctAnswer: 2
            },
            {
                question: "គណនាអាំងតេក្រាល៖ \\( \\int_1^{e^2} (\\ln x)^2 dx \\)",
                options: ["\\( 2e^2 - 2 \\)", "\\( e^2 - 1 \\)", "\\( 2e^2 + 2 \\)", "\\( 2e - 2 \\)"],
                correctAnswer: 0
            },
            {
                question: "គណនាអាំងតេក្រាល៖ \\( \\int_0^1 \\frac{x^2}{x+1} dx \\)",
                options: ["\\( \\ln 2 + \\frac{1}{2} \\)", "\\( 1 - \\ln 2 \\)", "\\( \\frac{1}{2}\\ln 2 \\)", "\\( \\ln 2 - \\frac{1}{2} \\)"],
                correctAnswer: 3
            },
            {
                question: "គណនាអាំងតេក្រាល៖ \\( \\int_2^3 \\frac{2}{x^2-1} dx \\)",
                options: ["\\( \\ln(3) \\)", "\\( \\ln\\left(\\frac{3}{2}\\right) \\)", "\\( \\ln(2) \\)", "\\( \\ln\\left(\\frac{2}{3}\\right) \\)"],
                correctAnswer: 1
            },
            {
                question: "គណនាអាំងតេក្រាល៖ \\( \\int_0^1 (e^x - 1) dx \\)",
                options: ["\\( e \\)", "\\( e - 2 \\)", "\\( e - 1 \\)", "\\( 1 \\)"],
                correctAnswer: 1
            },
            {
                question: "គណនាអាំងតេក្រាល៖ \\( \\int_0^1 (x-1) e^x dx \\)",
                options: ["\\( e - 2 \\)", "\\( 2 - e \\)", "\\( e - 1 \\)", "\\( 1 - e \\)"],
                correctAnswer: 1
            },
            {
                question: "គណនាអាំងតេក្រាល៖ \\( \\int_0^1 x e^x dx \\)",
                options: ["\\( 1 \\)", "\\( e \\)", "\\( e - 1 \\)", "\\( 0 \\)"],
                correctAnswer: 0
            },
            {
                question: "គណនាអាំងតេក្រាល៖ \\( \\int_0^1 (x^2 - x) e^x dx \\)",
                options: ["\\( 3 - e \\)", "\\( e - 3 \\)", "\\( 2 - e \\)", "\\( e - 2 \\)"],
                correctAnswer: 0
            },
            {
                question: "គណនាអាំងតេក្រាល៖ \\( \\int_1^e (\\ln x)^2 dx \\)",
                options: ["\\( e \\)", "\\( 2e \\)", "\\( e - 1 \\)", "\\( e - 2 \\)"],
                correctAnswer: 3
            },
            {
                question: "គណនាអាំងតេក្រាល៖ \\( \\int_0^1 (x-1)e^{-x} dx \\)",
                options: ["\\( -\\frac{1}{e} \\)", "\\( \\frac{1}{e} \\)", "\\( 1 - \\frac{1}{e} \\)", "\\( -1 \\)"],
                correctAnswer: 0
            },
            {
                question: "គណនាអាំងតេក្រាល៖ \\( \\int_0^1 (x-1)^2 e^{-x} dx \\)",
                options: ["\\( 1 - \\frac{1}{e} \\)", "\\( 1 - \\frac{2}{e} \\)", "\\( \\frac{2}{e} - 1 \\)", "\\( 1 + \\frac{2}{e} \\)"],
                correctAnswer: 1
            },
            {
                question: "គណនាអាំងតេក្រាល៖ \\( \\int_0^1 \\frac{2}{x+2} dx \\)",
                options: ["\\( \\ln(3) - \\ln(2) \\)", "\\( 2\\ln(3) - \\ln(2) \\)", "\\( 2\\ln(3) - 2\\ln(2) \\)", "\\( \\ln(6) \\)"],
                correctAnswer: 2
            },
            {
                question: "គណនាអាំងតេក្រាល៖ \\( \\int_1^e \\frac{\\ln x}{x} dx \\)",
                options: ["\\( 1 \\)", "\\( \\frac{1}{2} \\)", "\\( e \\)", "\\( \\frac{e}{2} \\)"],
                correctAnswer: 1
            },
            {
                question: "គណនាអាំងតេក្រាល៖ \\( \\int_0^1 \\frac{x}{x^2+1} dx \\)",
                options: ["\\( \\ln(2) \\)", "\\( \\frac{1}{2} \\ln(2) \\)", "\\( 2\\ln(2) \\)", "\\( \\frac{1}{4} \\ln(2) \\)"],
                correctAnswer: 1
            },
            {
                question: "គណនាអាំងតេក្រាល៖ \\( \\int_0^1 x \\ln(x^2+1) dx \\)",
                options: ["\\( \\ln(2) - 1 \\)", "\\( \\frac{1}{2}\\ln(2) - \\frac{1}{2} \\)", "\\( \\ln(2) - \\frac{1}{2} \\)", "\\( 2\\ln(2) - 1 \\)"],
                correctAnswer: 2
            },
            {
                question: "គណនាអាំងតេក្រាល៖ \\( \\int_1^e \\frac{1}{x} dx \\)",
                options: ["\\( e \\)", "\\( 0 \\)", "\\( 1 \\)", "\\( \\ln(e) - 1 \\)"],
                correctAnswer: 2
            },
            {
                question: "គណនាអាំងតេក្រាល៖ \\( \\int_0^1 x e^{2x} dx \\)",
                options: ["\\( \\frac{e^2-1}{4} \\)", "\\( \\frac{e^2+1}{2} \\)", "\\( \\frac{e^2-1}{2} \\)", "\\( \\frac{e^2+1}{4} \\)"],
                correctAnswer: 3
            },
            {
                question: "គណនាអាំងតេក្រាល៖ \\( \\int_0^1 x e^{-x} dx \\)",
                options: ["\\( 1 - \\frac{2}{e} \\)", "\\( 1 - \\frac{1}{e} \\)", "\\( \\frac{2}{e} - 1 \\)", "\\( 1 + \\frac{1}{e} \\)"],
                correctAnswer: 0
            },
            {
                question: "គណនាអាំងតេក្រាល៖ \\( \\int_1^e x^2 \\ln x dx \\)",
                options: ["\\( \\frac{2e^3-1}{9} \\)", "\\( \\frac{2e^3+1}{9} \\)", "\\( \\frac{e^3-1}{3} \\)", "\\( \\frac{e^3+1}{3} \\)"],
                correctAnswer: 1
            },
            {
                question: "គណនាអាំងតេក្រាល៖ \\( \\int_1^2 \\ln x dx \\)",
                options: ["\\( 2\\ln 2 - 1 \\)", "\\( \\ln 2 - 1 \\)", "\\( 2\\ln 2 + 1 \\)", "\\( \\ln 2 + 1 \\)"],
                correctAnswer: 0
            },
            {
                question: "គណនាអាំងតេក្រាល៖ \\( \\int_0^1 \\frac{x^3}{x^2+1} dx \\)",
                options: ["\\( \\frac{1}{2} + \\frac{1}{2}\\ln 2 \\)", "\\( 1 - \\frac{1}{2}\\ln 2 \\)", "\\( \\frac{1}{2} - \\frac{1}{2}\\ln 2 \\)", "\\( 1 + \\ln 2 \\)"],
                correctAnswer: 2
            }
        ];

        // State Variables
        let currentQuestionIndex = 0;
        let score = 0;
        let hasAnswered = false;

        // DOM Elements
        const startScreen = document.getElementById('start-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const nextBtn = document.getElementById('next-btn');
        const questionCounter = document.getElementById('question-counter');
        const scoreDisplay = document.getElementById('score-display');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');

        // Functions
        function startQuiz() {
            startScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            progressContainer.classList.remove('hidden');
            
            currentQuestionIndex = 0;
            score = 0;
            updateScore();
            loadQuestion();
        }

        function loadQuestion() {
            hasAnswered = false;
            nextBtn.classList.add('hidden');
            
            const currentQ = quizData[currentQuestionIndex];
            questionText.innerHTML = currentQ.question;
            questionCounter.textContent = `សំណួរទី ${currentQuestionIndex + 1} / ${quizData.length}`;
            
            // Update Progress Bar
            const progress = ((currentQuestionIndex) / quizData.length) * 100;
            progressBar.style.width = `${progress}%`;

            // Clear previous options
            optionsContainer.innerHTML = '';

            // Create option buttons
            currentQ.options.forEach((option, index) => {
                const btn = document.createElement('div');
                btn.className = 'option-btn border-2 border-gray-200 rounded-lg p-4 cursor-pointer text-gray-700 font-medium hover:border-blue-400 bg-white text-lg justify-center';
                btn.innerHTML = option;
                btn.onclick = () => selectOption(index, btn);
                optionsContainer.appendChild(btn);
            });

            // Re-render MathJax formulas
            if (window.MathJax) {
                MathJax.typesetPromise([document.getElementById('quiz-screen')]).catch((err) => console.log('MathJax error: ', err));
            }
        }

        function selectOption(selectedIndex, selectedBtn) {
            if (hasAnswered) return; // Prevent multiple clicks
            hasAnswered = true;

            const currentQ = quizData[currentQuestionIndex];
            const allBtns = optionsContainer.children;

            // Check if correct
            if (selectedIndex === currentQ.correctAnswer) {
                selectedBtn.classList.add('correct');
                score++;
                updateScore();
            } else {
                selectedBtn.classList.add('wrong');
                // Highlight correct answer
                allBtns[currentQ.correctAnswer].classList.add('correct');
            }

            // Disable all buttons and dim unselected
            for (let i = 0; i < allBtns.length; i++) {
                allBtns[i].style.pointerEvents = 'none';
                if (i !== selectedIndex && i !== currentQ.correctAnswer) {
                    allBtns[i].style.opacity = '0.5';
                }
            }

            // Show Next Button
            nextBtn.classList.remove('hidden');
            if (currentQuestionIndex === quizData.length - 1) {
                nextBtn.textContent = 'មើលលទ្ធផល 🏆';
                nextBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
                nextBtn.classList.add('bg-green-600', 'hover:bg-green-700');
            } else {
                nextBtn.textContent = 'បន្ទាប់ ➔';
            }
        }

        function nextQuestion() {
            currentQuestionIndex++;
            
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            quizScreen.classList.add('hidden');
            progressContainer.classList.add('hidden');
            resultScreen.classList.remove('hidden');

            const finalScore = document.getElementById('final-score');
            const resultMessage = document.getElementById('result-message');
            const resultIcon = document.getElementById('result-icon');

            finalScore.textContent = `${score}/${quizData.length}`;

            // Custom messages based on score
            const percentage = (score / quizData.length) * 100;
            if (percentage === 100) {
                resultMessage.textContent = "អស្ចារ្យណាស់! អ្នកពូកែគណិតវិទ្យាមែន 🌟";
                resultMessage.className = "text-lg font-bold mb-6 text-green-600";
                resultIcon.textContent = "🥇";
            } else if (percentage >= 60) {
                resultMessage.textContent = "ល្អណាស់! អ្នកចងចាំរូបមន្តបានល្អ 👍";
                resultMessage.className = "text-lg font-bold mb-6 text-blue-600";
                resultIcon.textContent = "👏";
            } else {
                resultMessage.textContent = "មិនអីទេ! សាកល្បងគណនាម្តងទៀត 💪";
                resultMessage.className = "text-lg font-bold mb-6 text-orange-500";
                resultIcon.textContent = "📚";
            }
        }

        function updateScore() {
            scoreDisplay.textContent = `ពិន្ទុ: ${score}`;
        }

        function restartQuiz() {
            // Reset next button styles if changed
            nextBtn.classList.remove('bg-green-600', 'hover:bg-green-700');
            nextBtn.classList.add('bg-blue-600', 'hover:bg-blue-700');
            startQuiz();
        }
    </script>
</body>
</html>
