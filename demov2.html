<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធកាលវិភាគវៃឆ្លាត PRO Max V5</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { font-family: 'Kantumruy Pro', sans-serif; background-color: #f3f4f6; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        /* Drag & Drop Styles */
        .drag-over { background-color: #dbeafe !important; border: 2px dashed #3b82f6 !important; }
        .filtered-out { opacity: 0.15; pointer-events: none; } 
        
        /* Smart Highlight Styles */
        .valid-drop { background-color: #dcfce7 !important; border: 2px dashed #22c55e !important; box-shadow: inset 0 0 10px rgba(34, 197, 94, 0.2); }
        .invalid-drop { background-color: #fee2e2 !important; opacity: 0.4; pointer-events: none; }
        
        /* Print Styles matching your images */
        @media print {
            body { background: white; }
            .print-hidden { display: none !important; }
            .print-container { padding: 0 !important; margin: 0 !important; max-width: 100% !important; }
            
            /* Specific Print Table styling */
            .print-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
            .print-table th, .print-table td { border: 1px solid #000 !important; padding: 6px; text-align: center; color: #000 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .print-table th { background-color: #f3f4f6 !important; font-weight: bold; }
            
            /* Signatures layout */
            .signature-area { display: flex; justify-content: space-between; margin-top: 30px; font-size: 14px; }
            .signature-box { text-align: center; width: 30%; }
        }
    </style>
</head>
<body class="text-gray-900 flex flex-col h-screen overflow-hidden">

    <!-- Navigation -->
    <nav class="bg-blue-900 text-white p-3 shadow-md print-hidden shrink-0 z-30 relative">
        <div class="max-w-[1800px] mx-auto flex flex-wrap justify-between items-center gap-3">
            <div class="flex items-center gap-2">
                <i data-lucide="layout-dashboard"></i>
                <h1 class="text-lg font-bold tracking-wider">School Smart PRO V5</h1>
            </div>
            <div class="flex gap-1 bg-blue-800 p-1.5 rounded-lg flex-wrap">
                <button onclick="changeTab('master')" id="tab-master" class="tab-btn px-4 py-1.5 rounded text-sm font-bold bg-white text-blue-900 shadow">តារាងរួម</button>
                <button onclick="changeTab('individual')" id="tab-individual" class="tab-btn px-4 py-1.5 rounded text-sm font-bold hover:bg-blue-700">កាលវិភាគរាយ (ព្រីន)</button>
                <button onclick="changeTab('assignments')" id="tab-assignments" class="tab-btn px-4 py-1.5 rounded text-sm font-bold hover:bg-blue-700">ចាត់តាំងម៉ោង</button>
                <button onclick="changeTab('settings')" id="tab-settings" class="tab-btn px-4 py-1.5 rounded text-sm font-bold hover:bg-blue-700">ការកំណត់</button>
                
                <div class="w-px bg-blue-700 mx-1 hidden md:block"></div>
                <button onclick="window.print()" class="bg-blue-500 hover:bg-blue-600 px-3 py-1.5 rounded text-sm font-bold flex items-center gap-1.5 text-white shadow-sm">
                    <i data-lucide="printer" class="w-4 h-4"></i> Print
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content Area (Scrollable) -->
    <main class="flex-1 overflow-y-auto bg-gray-100 p-4 print-container relative" id="main-content">
        
        <!-- PRINT VIEW TAB (NEW) -->
        <div id="individual" class="tab-content hidden animate-in fade-in max-w-[1200px] mx-auto">
            <div class="print-hidden bg-white p-4 rounded-xl shadow border mb-4 flex gap-4 items-center">
                <div class="font-bold text-blue-900">ជ្រើសរើសប្រភេទព្រីន៖</div>
                <select id="print-type" onchange="renderIndividualView()" class="border p-2 rounded outline-none font-bold">
                    <option value="class">ព្រីនតាមថ្នាក់រៀន</option>
                    <option value="teacher">ព្រីនតាមគ្រូបង្រៀន</option>
                </select>
                <select id="print-selector" onchange="renderIndividualView()" class="border p-2 rounded outline-none font-bold text-blue-600 flex-1"></select>
            </div>

            <!-- Area to be printed -->
            <div class="bg-white p-8 rounded-xl shadow-lg border print:shadow-none print:border-none print:p-0" id="print-canvas">
                <!-- Content injected via JS -->
            </div>
        </div>

        <!-- SETTINGS TAB (Keep from previous versions) -->
        <div id="settings" class="tab-content hidden animate-in fade-in max-w-6xl mx-auto space-y-6">
            <!-- (Skipped inner HTML for brevity, it's exactly the same as V4 Settings Tab) -->
            <!-- *Imagine Settings Tab HTML here* -->
            <div class="bg-white p-6 rounded-xl shadow border mb-4 text-center text-gray-500 text-xl font-bold">
                (ផ្ទាំងការកំណត់ - ដូច Version 4)
            </div>
        </div>

        <!-- ASSIGNMENTS TAB (Keep from previous versions) -->
        <div id="assignments" class="tab-content hidden animate-in fade-in max-w-5xl mx-auto">
            <!-- *Imagine Assignments Tab HTML here* -->
            <div class="bg-white p-6 rounded-xl shadow border mb-4 text-center text-gray-500 text-xl font-bold">
                (ផ្ទាំងចាត់តាំងម៉ោង - ដូច Version 4)
            </div>
        </div>

        <!-- MASTER GRID TAB (Updated with Waiting Box) -->
        <div id="master" class="tab-content block animate-in fade-in flex flex-col h-full">
            
            <!-- NEW: WAITING BOX / UNASSIGNED DOCK -->
            <div class="bg-white rounded-xl shadow-sm border border-orange-200 mb-4 print-hidden flex-shrink-0">
                <div class="bg-orange-50 p-2 border-b border-orange-100 rounded-t-xl flex justify-between items-center px-4 cursor-pointer" onclick="document.getElementById('waiting-content').classList.toggle('hidden')">
                    <h3 class="font-bold text-orange-800 flex items-center gap-2"><i data-lucide="inbox"></i> ប្រអប់រង់ចាំ (ម៉ោងចាត់មិនចូល/សល់)</h3>
                    <span id="waiting-badge" class="bg-orange-500 text-white text-xs px-2 py-1 rounded-full font-bold">0</span>
                </div>
                <div id="waiting-content" class="p-3 flex flex-wrap gap-2 max-h-32 overflow-y-auto">
                    <!-- Items injected via JS -->
                </div>
            </div>

            <!-- Master Table Section -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex-1 flex flex-col min-h-0 print:border-none print:shadow-none">
                <div class="p-3 border-b bg-gray-50 flex justify-between items-center print-hidden flex-wrap gap-3 rounded-t-xl">
                    <div class="flex items-center gap-4">
                        <h2 class="text-lg font-bold text-blue-900">តារាងរួម</h2>
                        <button onclick="generateAutoSchedule()" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-1.5 rounded font-bold flex items-center gap-1 shadow">
                            <i data-lucide="wand-2" class="w-4 h-4"></i> រៀបអូតូ
                        </button>
                    </div>
                    <!-- Filters -->
                    <div class="flex gap-3 bg-white p-1.5 rounded border">
                        <select id="filter-class" onchange="updateFilters()" class="text-sm border-none outline-none font-bold text-blue-700"><option value="ALL">មើលគ្រប់ថ្នាក់</option></select>
                        <div class="w-px bg-gray-300"></div>
                        <select id="filter-teacher" onchange="updateFilters()" class="text-sm border-none outline-none font-bold text-purple-700"><option value="ALL">ចម្រុះគ្រូទាំងអស់</option></select>
                    </div>
                    <button onclick="clearSchedule()" class="text-red-600 hover:bg-red-50 px-3 py-1.5 rounded text-sm font-bold border border-red-200 bg-white">លុបតារាងចោល</button>
                </div>

                <div class="overflow-auto flex-1 p-1 custom-scrollbar print:overflow-visible">
                    <table class="w-full border-collapse min-w-[1500px] table-fixed select-none" id="master-table">
                        <thead class="sticky top-0 z-20 bg-gray-200 shadow-sm" id="master-thead"></thead>
                        <tbody class="text-sm font-mono" id="master-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

<script>
// --- CONSTANTS & STATE (Kept from V4) ---
const DAYS = [
  { id: 'mon', name: 'ច័ន្ទ', short: 'ច' }, { id: 'tue', name: 'អង្គារ', short: 'អ' }, 
  { id: 'wed', name: 'ពុធ', short: 'ព' }, { id: 'thu', name: 'ព្រហស្បតិ៍', short: 'ព្រ' }, 
  { id: 'fri', name: 'សុក្រ', short: 'ស' }, { id: 'sat', name: 'សៅរ៍', short: 'សៅ' }
];
const TIME_SLOTS = [
  { id: 't1', label: '7h-8h' }, { id: 't2', label: '8h-9h' }, 
  { id: 't3', label: '9h-10h' }, { id: 't4', label: '10h-11h' }, { id: 't5', label: '11h-12h' },
  { id: 't6', label: '2h-3h' }, { id: 't7', label: '3h-4h' }, { id: 't8', label: '4h-5h' }
];
const COLORS = ['bg-[#00b050]', 'bg-[#ffff00] text-black', 'bg-[#0000ff]', 'bg-[#ffc000] text-black', 'bg-[#0070c0]', 'bg-[#7030a0]', 'bg-[#c00000]', 'bg-[#ff00ff]', 'bg-teal-500', 'bg-orange-500'];

let state = {
    schoolInfo: { department: 'មន្ទីរអប់រំ យុវជន និងកីឡា', schoolName: 'វិទ្យាល័យ គំរូ', principalName: 'នាយកសាលា', academicYear: '២០២៤-២០២៥' },
    departments: [ { id: 'M', name: 'គណិតវិទ្យា', color: 'bg-[#00b050] text-white' }, { id: 'K', name: 'អក្សរសាស្ត្រខ្មែរ', color: 'bg-[#ffff00] text-black' } ],
    classes: ['12A', '12B', '11E'],
    homeroomTeachers: { '11E': 'M2' }, 
    teachers: [
        { code: 'M1', name: 'ឆន ប៊ុណ្ណារិទ្ធ', deptId: 'M', availableDays: ['mon', 'tue', 'wed', 'thu', 'fri'] },
        { code: 'M2', name: 'រៀង ដាណែត', deptId: 'M', availableDays: ['mon', 'tue', 'wed', 'thu', 'fri', 'sat'] },
        { code: 'K1', name: 'គង់ ទិត្យ', deptId: 'K', availableDays: ['mon', 'wed', 'fri'] }
    ],
    assignments: [
        { id: 1, teacherCode: 'M1', className: '12A', hours: 4 },
        { id: 2, teacherCode: 'M2', className: '11E', hours: 6 },
        { id: 3, teacherCode: 'K1', className: '11E', hours: 6 }
    ],
    schedule: {},
    filters: { class: 'ALL', teacher: 'ALL' }
};

// --- INIT & TAB LOGIC ---
window.onload = () => { renderAll(); };

function renderAll() {
    renderFilters();
    renderMasterGrid();
    renderWaitingBox();
    lucide.createIcons();
}

function changeTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
    document.getElementById(tabId).classList.remove('hidden');
    
    document.querySelectorAll('.tab-btn').forEach(el => el.className = 'tab-btn px-4 py-1.5 rounded text-sm font-bold hover:bg-blue-700 text-white');
    document.getElementById(`tab-${tabId}`).className = 'tab-btn px-4 py-1.5 rounded text-sm font-bold bg-white text-blue-900 shadow';
    
    if(tabId === 'master') renderMasterGrid();
    if(tabId === 'individual') renderIndividualDropdown();
}

// ==========================================
// NEW FEATURE 1: WAITING BOX (UNASSIGNED)
// ==========================================
function getUnassignedData() {
    let unassigned = [];
    state.assignments.forEach(ass => {
        // Count how many times this teacher is scheduled for this class
        let placedHours = 0;
        for (let key in state.schedule) {
            if (state.schedule[key] === ass.teacherCode && key.startsWith(ass.className + '_')) {
                placedHours++;
            }
        }
        let leftover = ass.hours - placedHours;
        if (leftover > 0) {
            unassigned.push({ tCode: ass.teacherCode, className: ass.className, leftover });
        }
    });
    return unassigned;
}

function renderWaitingBox() {
    let unassigned = getUnassignedData();
    document.getElementById('waiting-badge').innerText = unassigned.reduce((sum, item) => sum + item.leftover, 0);
    
    let html = unassigned.map(u => {
        let t = state.teachers.find(x => x.code === u.tCode);
        let d = state.departments.find(x => x.id === t.deptId);
        let color = d ? d.color : 'bg-gray-500 text-white';
        
        return `
        <div draggable="true" ondragstart="handleDragStart(event, 'unassigned', '${u.tCode}', '${u.className}')" 
             class="${color} px-3 py-1.5 rounded shadow-sm border border-black/20 cursor-grab active:cursor-grabbing text-sm font-bold flex items-center gap-2">
            [${u.tCode}] ថ្នាក់ ${u.className} <span class="bg-white/90 text-black px-1.5 rounded-full text-[10px]">${u.leftover} ម៉ោង</span>
        </div>`;
    }).join('');
    
    document.getElementById('waiting-content').innerHTML = html || '<p class="text-gray-400 text-sm italic">គ្មានម៉ោងសល់ទេ (រៀបចូលតារាងអស់ហើយ)</p>';
}

// ==========================================
// NEW FEATURE 2: SMART HIGHLIGHT DROPZONES
// ==========================================
let draggedData = null;

function handleDragStart(e, sourceKey, tCode, className) {
    draggedData = { sourceKey, tCode, className };
    e.dataTransfer.effectAllowed = 'move';
    
    // Trigger Smart Highlight
    highlightValidSlots(tCode, className);
}

function highlightValidSlots(tCode, className) {
    let teacher = state.teachers.find(t => t.code === tCode);
    if(!teacher) return;

    document.querySelectorAll('#master-tbody td.dropzone').forEach(td => {
        let dClass = td.dataset.class;
        let dDay = td.dataset.day;
        let dTime = td.dataset.time;

        // Condition 1: Must drop in the correct Class Row
        if (dClass !== className) {
            td.classList.add('invalid-drop');
            return;
        }

        // Condition 2: Is teacher available this day?
        if (!teacher.availableDays.includes(dDay)) {
            td.classList.add('invalid-drop');
            return;
        }

        // Condition 3: Is teacher already teaching elsewhere?
        let hasConflict = checkTeacherConflict(state.schedule, tCode, dDay, dTime, draggedData.sourceKey);
        
        // Ensure max 2 hours per day per class rule is visually respected
        let hoursInThisDay = 0;
        for(let time of TIME_SLOTS) {
            if(state.schedule[`${className}_${dDay}_${time.id}`] === tCode) hoursInThisDay++;
        }

        if (hasConflict || hoursInThisDay >= 2) {
            td.classList.add('invalid-drop');
        } else {
            td.classList.add('valid-drop'); // GREEN LIGHT!
        }
    });
}

// Clear highlights when drag ends (dropped or cancelled)
document.addEventListener('dragend', () => {
    document.querySelectorAll('.valid-drop, .invalid-drop, .drag-over').forEach(el => {
        el.classList.remove('valid-drop', 'invalid-drop', 'drag-over');
    });
});

function allowDrop(e) {
    e.preventDefault();
    let td = e.target.closest('.dropzone');
    if(td && !td.classList.contains('invalid-drop')) td.classList.add('drag-over');
}
document.addEventListener('dragleave', (e) => {
    let td = e.target.closest('.dropzone');
    if(td) td.classList.remove('drag-over');
});

function handleDrop(e, targetKey) {
    e.preventDefault();
    if(!draggedData) return;
    
    let td = e.target.closest('.dropzone');
    if(td && td.classList.contains('invalid-drop')) return; // Prevent drop on red zones

    let { sourceKey, tCode, className } = draggedData;
    let targetCode = state.schedule[targetKey];
    
    let newSchedule = { ...state.schedule };
    newSchedule[targetKey] = tCode;

    if (sourceKey !== 'unassigned') {
        if(targetCode) newSchedule[sourceKey] = targetCode; // Swap
        else delete newSchedule[sourceKey]; // Move
    } else {
        // If dropped from Waiting Box to a cell that already has a teacher
        // The old teacher gets kicked out to the Waiting Box automatically!
        // No action needed, `renderWaitingBox` recalculates automatically.
    }

    state.schedule = newSchedule;
    renderMasterGrid();
    renderWaitingBox();
}

// --- MASTER GRID RENDER (Modified for Drag) ---
// (Simplified for brevity, similar to V4 but passing className to handleDragStart)
function renderMasterGrid() {
    let thead1 = `<tr><th rowspan="2" class="w-20 border border-gray-400 bg-gray-300 p-1 text-center font-bold sticky left-0 z-30">ថ្នាក់</th>`;
    let thead2 = `<tr>`;
    DAYS.forEach(day => {
        thead1 += `<th colspan="${TIME_SLOTS.length}" class="border border-gray-400 bg-gray-200 p-1 text-center font-bold uppercase">${day.name}</th>`;
        TIME_SLOTS.forEach(time => thead2 += `<th class="w-12 border border-gray-400 bg-gray-100 text-xs font-bold">${time.label.replace('h','')}</th>`);
    });
    document.getElementById('master-thead').innerHTML = thead1 + `</tr>` + thead2 + `</tr>`;

    let tbody = '';
    state.classes.forEach(cls => {
        let row = `<tr><td class="border border-gray-400 bg-gray-100 p-1 text-center font-bold text-red-600 sticky left-0 z-10">${cls}</td>`;
        DAYS.forEach(day => {
            TIME_SLOTS.forEach((time, tIndex) => {
                let key = `${cls}_${day.id}_${time.id}`;
                let tCode = state.schedule[key] || '';
                let colorCls = tCode ? getDeptColorClass(tCode) : '';
                let isBreak = tIndex === 4;
                
                let cellClass = `border border-gray-400 h-12 p-0 relative transition-all dropzone ${isBreak ? 'border-r-4 border-r-gray-500' : ''}`;
                
                // IMPORTANT: Pass 'cls' to handleDragStart so we know which class it belongs to
                row += `<td class="${cellClass}" data-key="${key}" data-day="${day.id}" data-time="${time.id}" data-class="${cls}" ondragover="allowDrop(event)" ondrop="handleDrop(event, '${key}')">
                            <div draggable="${!!tCode}" ondragstart="handleDragStart(event, '${key}', '${tCode}', '${cls}')" 
                                 class="w-full h-full flex items-center justify-center font-bold text-[14px] ${tCode ? 'cursor-grab ' + colorCls : ''}">${tCode}</div>
                        </td>`;
            });
        });
        row += `</tr>`; tbody += row;
    });
    document.getElementById('master-tbody').innerHTML = tbody;
    renderWaitingBox();
}

function getDeptColorClass(tCode) {
    let t = state.teachers.find(x => x.code === tCode);
    let d = t ? state.departments.find(x => x.id === t.deptId) : null;
    return d ? d.color : 'bg-gray-200 text-black';
}

function checkTeacherConflict(scheduleObj, tCode, dayId, timeId, ignoreKey = null) {
    for (let key in scheduleObj) {
        if (key === ignoreKey) continue;
        let [_, d, t] = key.split('_');
        if (d === dayId && t === timeId && scheduleObj[key] === tCode) return true;
    }
    return false;
}

// Auto Schedule Logic (Simplified logic that feeds leftovers to waiting box)
function generateAutoSchedule() {
    let newSchedule = {};
    let sortedAssigns = [...state.assignments].sort((a, b) => b.hours - a.hours);

    sortedAssigns.forEach(assign => {
        let teacher = state.teachers.find(t => t.code === assign.teacherCode);
        let availDays = teacher ? teacher.availableDays : DAYS.map(d=>d.id);
        let placed = 0;
        
        // Shuffle days for randomness
        let shuffledDays = [...availDays].sort(() => Math.random() - 0.5);

        for(let dayId of shuffledDays) {
            if(placed >= assign.hours) break;
            let hoursInDay = 0;
            for(let time of TIME_SLOTS) {
                let key = `${assign.className}_${dayId}_${time.id}`;
                if(!newSchedule[key] && !checkTeacherConflict(newSchedule, assign.teacherCode, dayId, time.id) && hoursInDay < 2) {
                    newSchedule[key] = assign.teacherCode;
                    placed++; hoursInDay++;
                }
                if(placed >= assign.hours) break;
            }
        }
        // If placed < assign.hours, it automatically gets caught by getUnassignedData()!
    });
    
    state.schedule = newSchedule;
    renderMasterGrid();
}


// ==========================================
// NEW FEATURE 3: INDIVIDUAL PRINT VIEWS
// ==========================================
function renderIndividualDropdown() {
    let type = document.getElementById('print-type').value;
    let selector = document.getElementById('print-selector');
    
    if(type === 'class') {
        selector.innerHTML = state.classes.map(c => `<option value="${c}">ថ្នាក់ទី ${c}</option>`).join('');
    } else {
        selector.innerHTML = state.teachers.map(t => `<option value="${t.code}">លោកគ្រូ/អ្នកគ្រូ ${t.name}</option>`).join('');
    }
    renderIndividualView();
}

function renderIndividualView() {
    let type = document.getElementById('print-type').value;
    let val = document.getElementById('print-selector').value;
    if(!val) return;

    let html = `
        <div class="flex justify-between items-start mb-6 print-header">
            <div class="text-left font-bold text-[14px] leading-tight">
                <p>ការិយាល័យអប់រំ យុវជន និងកីឡា</p>
                <p>${state.schoolInfo.schoolName}</p>
            </div>
            <div class="text-center">
                <p class="font-bold text-[16px] font-khmer">ព្រះរាជាណាចក្រកម្ពុជា</p>
                <p class="font-bold text-[14px]">ជាតិ សាសនា ព្រះមហាក្សត្រ</p>
                <p class="text-[12px] mt-1">⚝⚝⚝⚝⚝</p>
            </div>
        </div>
    `;

    if (type === 'class') {
        let hrCode = state.homeroomTeachers[val];
        let hrTeacher = hrCode ? state.teachers.find(t=>t.code===hrCode) : null;
        let hrName = hrTeacher ? hrTeacher.name : 'មិនទាន់កំណត់';

        html += `
            <div class="text-center mb-4">
                <h2 class="text-[16px] font-bold">កាលវិភាគសិក្សាប្រចាំសប្ដាហ៍</h2>
                <h3 class="text-[15px] font-bold text-blue-800">ថ្នាក់ទី ${val} <span class="text-gray-600">|</span> គ្រូបន្ទុកថ្នាក់ឈ្មោះ៖ ${hrName}</h3>
                <p class="text-[13px] mt-1">ឆ្នាំសិក្សា ${state.schoolInfo.academicYear}</p>
            </div>
            <table class="print-table">
                <thead>
                    <tr>
                        <th class="w-16">ម៉ោង</th>
                        ${DAYS.map(d => `<th>${d.name}</th>`).join('')}
                    </tr>
                </thead>
                <tbody>
        `;

        TIME_SLOTS.forEach((time, tIndex) => {
            if(tIndex === 4) html += `<tr class="bg-gray-100"><td colspan="7" class="font-bold py-1">ពេលរសៀល / ម៉ោងសម្រាក</td></tr>`;
            html += `<tr><td class="font-bold">${time.label.replace('h','')}</td>`;
            
            DAYS.forEach(day => {
                let tCode = state.schedule[`${val}_${day.id}_${time.id}`];
                let subject = '';
                if(tCode) {
                    let teacher = state.teachers.find(t=>t.code===tCode);
                    let dept = teacher ? state.departments.find(d=>d.id===teacher.deptId) : null;
                    subject = dept ? dept.name : tCode;
                }
                html += `<td><span class="font-bold text-blue-900">${subject}</span></td>`;
            });
            html += `</tr>`;
        });
        html += `</tbody></table>`;

    } else if (type === 'teacher') {
        let teacher = state.teachers.find(t=>t.code===val);
        let dept = state.departments.find(d=>d.id===teacher.deptId);
        
        // Find Homeroom Class
        let hrClass = Object.keys(state.homeroomTeachers).find(key => state.homeroomTeachers[key] === val) || 'គ្មាន';
        
        let totalHours = 0;
        
        html += `
            <div class="text-center mb-6">
                <h2 class="text-[16px] font-bold mb-3">កាលវិភាគប្រចាំសប្ដាហ៍</h2>
                <div class="inline-block text-left border border-gray-300 p-3 rounded bg-gray-50">
                    <p class="mb-1"><span class="w-24 inline-block text-gray-600">ឈ្មោះគ្រូ៖</span> <span class="font-bold text-red-600 text-[15px]">${teacher.name}</span></p>
                    <p class="mb-1"><span class="w-24 inline-block text-gray-600">មុខវិជ្ជា៖</span> <span class="font-bold text-blue-800">${dept ? dept.name : '---'}</span></p>
                    <p><span class="w-24 inline-block text-gray-600">បន្ទុកថ្នាក់ទី៖</span> <span class="font-bold">${hrClass}</span></p>
                </div>
            </div>
            <table class="print-table">
                <thead>
                    <tr>
                        <th class="w-16">ម៉ោង</th>
                        ${DAYS.map(d => `<th>${d.name}</th>`).join('')}
                    </tr>
                </thead>
                <tbody>
        `;

        TIME_SLOTS.forEach((time, tIndex) => {
            if(tIndex === 4) html += `<tr class="bg-gray-100"><td colspan="7" class="font-bold py-1">ពេលរសៀល</td></tr>`;
            html += `<tr><td class="font-bold">${time.label.replace('h','')}</td>`;
            
            DAYS.forEach(day => {
                let teachingClass = '';
                for(let c of state.classes) {
                    if(state.schedule[`${c}_${day.id}_${time.id}`] === val) {
                        teachingClass = c;
                        totalHours++;
                        break;
                    }
                }
                html += `<td><span class="font-bold text-blue-700">${teachingClass}</span></td>`;
            });
            html += `</tr>`;
        });
        
        html += `
                </tbody>
            </table>
            
            <div class="flex justify-between mt-4 px-4 text-[13px] font-bold bg-gray-50 p-2 border">
                <div>ចំនួនម៉ោងបង្រៀនសរុប៖ <span class="text-blue-700 text-[15px]">${totalHours} ម៉ោង</span></div>
            </div>
        `;
    }

    html += `
        <div class="signature-area mt-8">
            <div class="signature-box">
                <p class="font-bold mb-16">បានឃើញ និងឯកភាព</p>
                <p class="font-bold">${state.schoolInfo.principalName}</p>
            </div>
            <div class="signature-box">
                <p class="text-[12px] text-gray-600 mb-1">ថ្ងៃ........ ខែ........ ឆ្នាំ........ ព.ស ២៥៦_</p>
                <p class="mb-16">ធ្វើនៅ...............ថ្ងៃទី.......ខែ........ឆ្នាំ២០២_</p>
                <p class="font-bold">${type === 'class' ? 'គ្រូបន្ទុកថ្នាក់' : 'ហត្ថលេខាគ្រូ'}</p>
            </div>
        </div>
    `;

    document.getElementById('print-canvas').innerHTML = html;
}

function clearSchedule() {
    state.schedule = {};
    renderMasterGrid();
}
</script>
</body>
</html>
