        // Render Quiz
        const questionsList = document.getElementById('questions-list');
        
        quizData.forEach((item, index) => {
            let optionsHtml = '';
            item.options.forEach((opt, optIndex) => {
                // Removed the 'required' attribute from inputs to allow partial submissions
                optionsHtml += `
                    <label class="flex items-center p-4 border-2 border-gray-100 rounded-xl cursor-pointer hover:bg-blue-50 hover:border-blue-200 transition duration-200 group">
                        <input type="radio" name="q${index}" value="${optIndex}" class="form-radio h-5 w-5 text-blue-600 focus:ring-blue-500">
                        <span class="ml-3 text-gray-700 group-hover:text-blue-800 text-base md:text-lg">${opt}</span>
                    </label>
                `;
            });

            const qHtml = `
                <div class="mb-8 p-6 md:p-8 bg-white rounded-2xl border border-gray-200 shadow-sm question-block transition-all" id="qb-${index}">
                    <div class="flex items-start mb-6">
                        <div class="flex-shrink-0 bg-blue-100 text-blue-700 font-bold rounded-full w-10 h-10 flex items-center justify-center mr-4 mt-1">
                            ${index + 1}
                        </div>
                        <h3 class="text-lg md:text-xl font-semibold text-gray-800 leading-relaxed">${item.q}</h3>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 ml-0 md:ml-14">
                        ${optionsHtml}
                    </div>
                    <div id="feedback-${index}" class="mt-5 ml-0 md:ml-14 hidden text-md font-medium p-3 rounded-lg"></div>
                </div>
            `;
            questionsList.insertAdjacentHTML('beforeend', qHtml);
        });

        // Handle Form Submission
        document.getElementById('quiz-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            let score = 0;
            let wrongTopics = [];

            quizData.forEach((item, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                const qBlock = document.getElementById(`qb-${index}`);
                const feedbackDiv = document.getElementById(`feedback-${index}`);
                
                feedbackDiv.classList.remove('hidden');

                if (selected && parseInt(selected.value) === item.correct) {
                    score++;
                    qBlock.classList.add('border-green-400', 'bg-green-50');
                    qBlock.classList.remove('border-gray-200', 'bg-white');
                    feedbackDiv.innerHTML = '✅ ចម្លើយត្រឹមត្រូវ';
                    feedbackDiv.classList.add('text-green-700', 'bg-green-100');
                } else {
                    wrongTopics.push(item.topic);
                    qBlock.classList.add('border-red-400', 'bg-red-50');
                    qBlock.classList.remove('border-gray-200', 'bg-white');
                    
                    let statusText = selected ? 'ចម្លើយខុស' : 'មិនបានឆ្លើយ';
                    feedbackDiv.innerHTML = `❌ ${statusText}។ ចម្លើយដែលត្រឹមត្រូវគឺ: <span class="font-bold">${item.options[item.correct]}</span>`;
                    feedbackDiv.classList.add('text-red-700', 'bg-red-100');
                }

                // Disable inputs
                const inputs = document.querySelectorAll(`input[name="q${index}"]`);
                inputs.forEach(input => input.disabled = true);
            });

            // Re-render MathJax to display the correct answers properly
            if(typeof MathJax !== 'undefined' && typeof MathJax.typesetPromise === 'function') {
                MathJax.typesetPromise().catch((err) => console.error('MathJax error: ', err));
            }

            // Remove duplicates from wrong topics so AI doesn't get overwhelmed
            wrongTopics = [...new Set(wrongTopics)];

            // Show results
            document.getElementById('score-display').innerText = `${score}/${quizData.length}`;
            document.querySelector('button[type="submit"]').parentElement.style.display = 'none';
            
            const resultContainer = document.getElementById('result-container');
            resultContainer.classList.remove('hidden');
            resultContainer.scrollIntoView({ behavior: 'smooth' });

            // Call Gemini AI
            fetchAIFeedback(score, quizData.length, wrongTopics);
        });

        // Gemini AI API integration with exponential backoff
        const apiKey = ""; // API key is injected by the environment

        async function fetchAIFeedback(score, total, wrongTopics) {
            const loadingDiv = document.getElementById('ai-loading');
            const feedbackDiv = document.getElementById('ai-feedback');
            
            // Construct the prompt directly into the text to avoid any schema incompatibility
            let promptText = `(System Instruction: អ្នកគឺជាគ្រូបង្រៀនគណិតវិទ្យាថ្នាក់ទី៩ដ៏ពូកែនិងចេះលើកទឹកចិត្តម្នាក់។)\n\n`;
            promptText += `សិស្សរបស់អ្នកទើបតែប្រឡងតេស្តត្រៀមប្រឡងបឋមភូមិ (ឌីប្លូម) បានពិន្ទុ ${score} លើ ${total}។\n`;
            
            if (score === total) {
                promptText += `គាត់ធ្វើត្រូវទាំងអស់។ សូមសរសេរពាក្យសរសើរយ៉ាងជ្រាលជ្រៅ និងលើកទឹកចិត្តឲ្យគាត់បន្តការព្យាយាម ដើម្បីទទួលបាននិទ្ទេសល្អក្នុងការប្រឡងពិតប្រាកដ។`;
            } else if (score >= 15) {
                 promptText += `គាត់ធ្វើបានល្អបង្គួរ ប៉ុន្តែបានធ្វើខុសខ្លះៗលើមេរៀន/ចំណុចទាំងនេះ៖ ${wrongTopics.join(', ')}។ សូមសរសេរយោបល់លើកទឹកចិត្ត និងណែនាំគាត់ពីរបៀបរំលឹកមេរៀនចំណុចខ្សោយទាំងនេះបន្ថែម។`;
            } else {
                promptText += `គាត់ទទួលបានពិន្ទុខ្សោយ ដោយខុសច្រើនលើមេរៀន៖ ${wrongTopics.join(', ')}។ សូមសរសេរយោបល់លើកទឹកចិត្តកុំឲ្យគាត់បាក់ទឹកចិត្ត និងណែនាំពីរបៀបរៀនសូត្រពីមូលដ្ឋានគ្រឹះឡើងវិញ។`;
            }
            
            promptText += `\n\nសូមសរសេរជាភាសាខ្មែរឲ្យបានពីរោះ ត្រឹមត្រូវ ខ្លីល្មម (ប្រហែល ៤ ទៅ ៥ របះ) ប្រើពាក្យសំដីដូចគ្រូនិយាយទៅកាន់សិស្ស។`;

            const payload = {
                contents: [{ 
                    role: "user",
                    parts: [{ text: promptText }] 
                }]
            };

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            let retries = 0;
            const maxRetries = 5;
            const delays = [1000, 2000, 4000, 8000, 16000];
            let lastErrorMsg = "";

            while (retries < maxRetries) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errData = await response.json().catch(() => ({}));
                        throw new Error(`API Error ${response.status}: ${errData.error?.message || 'សូមពិនិត្យមើលបណ្ដាញភ្ជាប់អ៉ីនធឺណិត'}`);
                    }

                    const data = await response.json();
                    
                    if (data.candidates && data.candidates.length > 0) {
                        const aiText = data.candidates[0].content?.parts?.[0]?.text;
                        if (aiText) {
                            loadingDiv.classList.add('hidden');
                            feedbackDiv.innerHTML = `<p>${aiText.replace(/\n/g, '<br>')}</p>`;
                            feedbackDiv.classList.remove('hidden');
                            return; // Success, exit loop
                        }
                    }
                    
                    throw new Error("ប្រព័ន្ធមិនមានទិន្នន័យឆ្លើយតបត្រឡប់មកវិញទេ។");

                } catch (error) {
                    lastErrorMsg = error.message;
                    retries++;
                    if (retries >= maxRetries) {
                        loadingDiv.classList.add('hidden');
                        feedbackDiv.innerHTML = `<p class="text-red-500 font-bold mb-2">សូមអភ័យទោស លោកគ្រូ AI កំពុងរវល់មិនអាចជួយផ្ដល់យោបល់បាននៅពេលនេះទេ។ សូមអ្នកខិតខំប្រឹងប្រែងរៀនសូត្របន្តទៀត!</p>
                        <p class="text-xs text-red-400 font-mono mt-2 p-2 bg-red-50 rounded border border-red-100">កូដបញ្ហា (Error): ${lastErrorMsg}</p>`;
                        feedbackDiv.classList.remove('hidden');
                    } else {
                        // Wait before retrying
                        await new Promise(res => setTimeout(res, delays[retries - 1]));
                    }
                }
            }
        }
    </script>
</body>
